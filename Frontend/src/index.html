<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Pizza hut - Inicio</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  
  <!-- Preconnect to CDNs -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">

  <!-- Async CSS for Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"></noscript>
  
  <link rel="preload" as="style" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"></noscript>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" media="print" onload="this.media='all'">
  <noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"></noscript>
  
  <!-- Scripts removidos -->

  <!-- Preload LCP Image -->
  <link rel="preload" as="image" href="combo1.webp">
  <link rel="preload" as="image" href="pizza_delivery_hero.webp">
  
  <script>
    // Cargar preferencias de accesibilidad antes de renderizar
    if (localStorage.getItem('alta-contraste') === 'true') {
      document.documentElement.dataset.contraste = 'alto';
    }

    // Cargar modo de daltonismo
    const colorblindMode = localStorage.getItem('colorblind-mode') || 'none';
    if (colorblindMode !== 'none') {
      document.documentElement.dataset.colorblind = colorblindMode;
    }

    // Cargar tamaño de fuente
    const fontSize = localStorage.getItem('font-size') || 'normal';
    if (fontSize !== 'normal') {
      document.documentElement.dataset.fontSize = fontSize;
    }

    // Cargar modo dislexia
    if (localStorage.getItem('dyslexia-mode') === 'true') {
      document.documentElement.dataset.dyslexia = 'true';
    }

    // Cargar reducción de movimiento
    if (localStorage.getItem('reduce-motion') === 'true') {
      document.documentElement.dataset.reduceMotion = 'true';
    }
  </script>
</head>
<body>
  <app-root></app-root>
  <script>
    window.toggleAltoContraste = function() {
      const html = document.documentElement;
      const esActivo = html.dataset.contraste === 'alto';

      if (esActivo) {
        delete html.dataset.contraste;
        localStorage.setItem('alta-contraste', 'false');
      } else {
        html.dataset.contraste = 'alto';
        localStorage.setItem('alta-contraste', 'true');
      }
    };

    window.getEstadoContraste = function() {
      return document.documentElement.dataset.contraste === 'alto';
    };

    // Funciones para daltonismo
    window.setColorblindMode = function(mode) {
      const html = document.documentElement;
      delete html.dataset.colorblind;

      if (mode !== 'none') {
        html.dataset.colorblind = mode;
      }

      localStorage.setItem('colorblind-mode', mode);
    };

    window.getColorblindMode = function() {
      return document.documentElement.dataset.colorblind || 'none';
    };

    // Funciones para tamaño de fuente
    window.setFontSize = function(size) {
      const html = document.documentElement;
      delete html.dataset.fontSize;

      if (size !== 'normal') {
        html.dataset.fontSize = size;
      }

      localStorage.setItem('font-size', size);
    };

    window.getFontSize = function() {
      return document.documentElement.dataset.fontSize || 'normal';
    };

    // Funciones para modo dislexia
    window.toggleDyslexiaMode = function() {
      const html = document.documentElement;
      const isActive = html.dataset.dyslexia === 'true';
      if (isActive) {
        delete html.dataset.dyslexia;
        localStorage.setItem('dyslexia-mode', 'false');
      } else {
        html.dataset.dyslexia = 'true';
        localStorage.setItem('dyslexia-mode', 'true');
      }
    };

    window.getDyslexiaMode = function() {
      return document.documentElement.dataset.dyslexia === 'true';
    };

    // Funciones para reducción de movimiento
    window.toggleReduceMotion = function() {
      const html = document.documentElement;
      const isActive = html.dataset.reduceMotion === 'true';
      if (isActive) {
        delete html.dataset.reduceMotion;
        localStorage.setItem('reduce-motion', 'false');
      } else {
        html.dataset.reduceMotion = 'true';
        localStorage.setItem('reduce-motion', 'true');
      }
    };

    window.getReduceMotion = function() {
      return document.documentElement.dataset.reduceMotion === 'true';
    };
  </script>
</body>
</html>
