<div class="login-page">
  <div class="login-form-section">
    <div class="login-form-container">
      <div class="login-header mb-4">
        <h2 class="login-title">¡Inicia Sesión!</h2>
              <p class="login-subtitle">¡Masturba tu mente, eyacula ideas!</p>
      </div>

      <!-- Formulario de login -->
      <form (ngSubmit)="onLogin($event)" #loginForm="ngForm">

        <!-- Correo electrónico -->
        <div class="form-group">
          <label for="email">Correo electrónico</label>
          <div class="input-with-icon">
            <i class="fas fa-envelope"></i>
            <input
              type="email"
              id="email"
              name="email"
              placeholder="Ingresar correo electrónico"
              [(ngModel)]="usuario.email"
              required
            />
          </div>
        </div>

        <!-- Contraseña -->
        <div class="form-group">
          <label for="password">Contraseña</label>
          <div class="input-with-icon">
            <i class="fas fa-lock"></i>
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Ingresar contraseña"
              [(ngModel)]="usuario.password"
              required
            />
          </div>
        </div>

        <!-- Error -->
        @if (loginError) {
          <div class="alert alert-error mb-3">
            <i class="fas fa-exclamation-circle"></i>
            {{ loginError }}
          </div>
        }

        <!-- Indicador de carga -->
        @if (loading) {
          <div class="loading mb-3">
            <i class="fas fa-spinner fa-spin"></i> Iniciando sesión...
          </div>
        }

        <!-- Botón login -->
        <button 
          type="submit" 
          class="btn-login"
          [disabled]="!loginForm.form.valid || loading">
          @if (!loading) {
            <i class="fas fa-sign-in-alt"></i>
          }
          @if (loading) {
            <i class="fas fa-spinner fa-spin"></i>
          }
          {{ loading ? 'Iniciando...' : 'Iniciar sesión' }}
        </button>

        <!-- Enlace a registro -->
        <div class="text-center mt-3">
          <p>¿No tienes una cuenta? 
            <a routerLink="/register" class="register-link">¡Regístrate ya!</a>
          </p>
        </div>
      </form>
    </div>
  </div>
</div>
