spring.application.name=Mondongo
server.port=8089

# Cargar variables desde .env si existe
spring.config.import=optional:file:.env[.properties]

# =====================================================
# BASE DE DATOS MYSQL
# =====================================================
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# =====================================================
# HIKARICP (POOL DE CONEXIONES)
# =====================================================
spring.datasource.hikari.pool-name=HikariPool
spring.datasource.hikari.maximum-pool-size=200
spring.datasource.hikari.minimum-idle=10
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.auto-commit=true

# =====================================================
# JPA / HIBERNATE
# =====================================================
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.open-in-view=false

spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
spring.jpa.hibernate.naming.implicit-strategy=org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl

# =====================================================
# JWT
# =====================================================
app.jwtSecret=${JWT_SECRET:mySecretKeymySecretKeymySecretKeymySecretKeymySecretKeymySecretKey}
app.jwtExpirationInMs=${JWT_EXPIRATION_MS:900000}
app.jwtRefreshExpirationInMs=${JWT_REFRESH_EXPIRATION_MS:86400000}

# =====================================================
# TOMCAT (Configuración EXTREMA para 10K)
# =====================================================
# Máximo de conexiones TCP que Tomcat mantendrá abiertas a la vez
server.tomcat.max-connections=20000
# Cola de espera (si se superan los hilos activos)
server.tomcat.accept-count=10000
# Cajeros trabajando (Subir más de esto podría colapsar tu RAM)
server.tomcat.threads.max=1000
server.tomcat.threads.min-spare=50

# =====================================================
# LOGGING
# =====================================================
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=INFO
logging.level.com.zaxxer.hikari=INFO
logging.level.org.springframework.cache=TRACE